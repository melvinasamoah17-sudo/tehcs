
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — TEHCS</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --navy:   #1B2B5E;
      --navy-dk:#101D3F;
      --gold:   #F5A623;
      --gold-dk:#D4891A;
      --red:    #E63329;
      --white:  #FFFFFF;
      --off:    #F7F8FC;
      --border: rgba(27,43,94,.12);
      --tmid:   #3D4466;
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(140deg, #0c1930 0%, #1B2B5E 55%, #253470 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      position: relative; overflow: hidden;
    }
    body::before {
      content: ''; position: absolute; top: -100px; right: -100px;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,166,35,.12) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: ''; position: absolute; bottom: -80px; left: -80px;
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(230,51,41,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      background: #fff; border-radius: 24px;
      padding: 52px 48px; width: 100%; max-width: 440px;
      box-shadow: 0 32px 80px rgba(0,0,0,.35);
      position: relative; z-index: 2;
      animation: fadeUp .6s ease both;
    }

    .login-logo {
      text-align: center; margin-bottom: 36px;
    }
    .login-logo img {
      height: 70px; width: auto; object-fit: contain;
      margin: 0 auto 14px; display: block;
    }
    .login-logo-fallback {
      width: 70px; height: 70px; border-radius: 14px;
      background: var(--gold); color: var(--navy-dk);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
    }
    .login-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem; font-weight: 900; color: var(--navy);
      text-transform: uppercase; letter-spacing: .04em;
    }
    .login-sub {
      font-size: .82rem; color: #888; margin-top: 4px; font-weight: 400;
    }

    .admin-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(230,51,41,.08); border: 1px solid rgba(230,51,41,.2);
      color: var(--red); padding: 5px 14px; border-radius: 100px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .72rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; margin-bottom: 28px;
    }
    .admin-badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--red);
    }

    .f-group { margin-bottom: 18px; }
    .f-group label {
      display: block; font-family: 'Barlow Condensed', sans-serif;
      font-size: .72rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--tmid); margin-bottom: 7px;
    }
    .f-group input {
      width: 100%; padding: 13px 16px; border-radius: 10px;
      border: 2px solid var(--border); background: var(--off);
      font-family: 'Nunito', sans-serif; font-size: .95rem;
      color: var(--navy-dk); outline: none;
      transition: border-color .2s, background .2s;
    }
    .f-group input:focus { border-color: var(--navy); background: #fff; }

    .login-btn {
      width: 100%; padding: 15px; margin-top: 8px;
      background: var(--navy); color: #fff; border: none;
      border-radius: 100px; cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem; font-weight: 800;
      letter-spacing: .08em; text-transform: uppercase;
      transition: all .25s; display: flex; align-items: center;
      justify-content: center; gap: 10px;
    }
    .login-btn:hover { background: var(--gold); color: var(--navy-dk); transform: translateY(-2px); box-shadow: 0 10px 28px rgba(245,166,35,.35); }
    .login-btn:disabled { opacity: .65; pointer-events: none; }

    .spinner {
      display: none; width: 18px; height: 18px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.3); border-top-color: #fff;
      animation: spin .7s linear infinite;
    }
    .login-btn.loading .spinner { display: block; }

    .error-box {
      display: none; background: #fef2f2; border: 1px solid #fca5a5;
      border-radius: 10px; padding: 12px 16px; margin-bottom: 18px;
      font-size: .88rem; color: #b91c1c; line-height: 1.5;
    }
    .error-box.show { display: block; animation: fadeUp .3s ease; }

    .login-footer {
      text-align: center; margin-top: 28px;
      font-size: .78rem; color: #aaa;
    }
    .login-footer a { color: var(--navy); text-decoration: none; font-weight: 600; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .8rem; color: rgba(255,255,255,.5);
      text-decoration: none; position: absolute; top: 28px; left: 32px;
      z-index: 3; transition: color .2s;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
    }
    .back-link:hover { color: var(--gold); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }
    @keyframes spin   { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

  <a href="../index.html" class="back-link">← Back to Site</a>

  <div class="login-card">
    <div class="login-logo">
      <img src="../images/tehcs.jpg" alt="TEHCS Logo"
           onerror="this.style.display='none';document.querySelector('.login-logo-fallback').style.display='flex'">
      <div class="login-logo-fallback" style="display:none">TEHCS</div>
      <div class="login-title">Admin Portal</div>
      <div class="login-sub">Twitch Empire Home Care Service</div>
    </div>

    <div style="text-align:center">
      <span class="admin-badge">Staff Access Only</span>
    </div>

    <div class="error-box" id="errorBox"></div>

    <form id="loginForm">
      <div class="f-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="admin@tehcs.com" required autocomplete="email">
      </div>
      <div class="f-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn" id="loginBtn">
        <div class="spinner"></div>
        <span id="loginText">Sign In to Dashboard</span>
      </button>
    </form>

    <div class="login-footer">
      <p>© 2026 TEHCS · <a href="mailto:twitchempireinfo@gmail.com">Need help?</a></p>
    </div>
  </div>

<!-- Firebase -->
<script type="module">
  import { initializeApp }        from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBg_fCZkhkzNr41f6xespzlRucs6wVk9ck",
    authDomain:        "tehcs-675c6.firebaseapp.com",
    projectId:         "tehcs-675c6",
    storageBucket:     "tehcs-675c6.firebasestorage.app",
    messagingSenderId: "428200196151",
    appId:             "1:428200196151:web:2dee682eda618b2ac7e7b2"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // If already logged in → redirect to dashboard
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'dashboard.html';
  });

  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn      = document.getElementById('loginBtn');
    const btnText  = document.getElementById('loginText');
    const errorBox = document.getElementById('errorBox');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.classList.add('loading');
    btn.disabled = true;
    btnText.textContent = 'Signing in...';
    errorBox.classList.remove('show');

    try {
      await signInWithEmailAndPassword(auth, email, password);
      // onAuthStateChanged will redirect
    } catch (err) {
      btn.classList.remove('loading');
      btn.disabled = false;
      btnText.textContent = 'Sign In to Dashboard';

      const messages = {
        'auth/invalid-email':      'Invalid email address.',
        'auth/user-not-found':     'No admin account found with this email.',
        'auth/wrong-password':     'Incorrect password. Please try again.',
        'auth/invalid-credential': 'Incorrect email or password.',
        'auth/too-many-requests':  'Too many attempts. Please wait a few minutes.',
      };
      errorBox.textContent = messages[err.code] || 'Login failed. Please try again.';
      errorBox.classList.add('show');
    }
  });
</script>
</body>
</html>
